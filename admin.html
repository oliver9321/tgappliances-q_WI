<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TG Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/admin.css" />
</head>
<body>
  <div id="login-section">
    <div class="login-card">
      <div class="login-logo">
        <img src="/logo2.png" alt="TG Pre-Owned Appliances" />
      </div>
      <h1>Admin Panel</h1>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-username">Usuario</label>
          <input type="text" id="login-username" name="username"
            autocomplete="username" required placeholder="Usuario" />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" name="password"
            autocomplete="current-password" required placeholder="Contraseña" />
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="fas fa-sign-in-alt"></i> Iniciar sesión
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { login, getSession, isAdmin } from '/src/admin/auth-login.js'

    // Already logged in → go straight to products
    const session = getSession()
    if (session && isAdmin(session)) {
      window.location.href = '/admin-products.html'
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const form = e.target
      const username  = form.querySelector('[name="username"]').value.trim()
      const password  = form.querySelector('[name="password"]').value
      const errorEl   = document.getElementById('login-error')
      const submitBtn = form.querySelector('[type="submit"]')

      submitBtn.disabled = true
      errorEl.hidden = true

      try {
        await login(username, password)
        window.location.href = '/admin-products.html'
      } catch (err) {
        errorEl.textContent = err.message || 'Credenciales inválidas'
        errorEl.hidden = false
        submitBtn.disabled = false
      }
    })
  </script>
</body>
</html>
