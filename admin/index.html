<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TG Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./admin.css" />
</head>
<body class="login-body">

  <div class="d-flex align-items-center justify-content-center min-vh-100 p-3">
    <div class="login-card card shadow-lg p-4" style="width:100%;max-width:400px;">
      <div class="text-center mb-4">
        <h1 class="h4 fw-bold mt-3 mb-0">Admin Panel</h1>
      </div>
      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login-username" class="form-label fw-semibold">Usuario</label>
          <input type="text" id="login-username" name="username" class="form-control"
            autocomplete="username" required placeholder="Usuario" />
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label fw-semibold">Contraseña</label>
          <input type="password" id="login-password" name="password" class="form-control"
            autocomplete="current-password" required placeholder="Contraseña" />
        </div>
        <div id="login-error" class="alert alert-danger py-2 small" hidden></div>
        <button type="submit" class="btn btn-danger w-100 mt-1">
          <i class="fas fa-sign-in-alt me-1"></i> Iniciar sesión
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { login, getSession, isAdmin } from './auth-login.js'

    const session = getSession()
    if (session && isAdmin(session)) {
      window.location.href = '/admin/products.html'
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const form = e.target
      const username  = form.querySelector('[name="username"]').value.trim()
      const password  = form.querySelector('[name="password"]').value
      const errorEl   = document.getElementById('login-error')
      const submitBtn = form.querySelector('[type="submit"]')

      submitBtn.disabled = true
      errorEl.hidden = true

      try {
        await login(username, password)
        window.location.href = '/admin/products.html'
      } catch (err) {
        errorEl.textContent = err.message || 'Credenciales inválidas'
        errorEl.hidden = false
        submitBtn.disabled = false
      }
    })
  </script>
</body>
</html>
